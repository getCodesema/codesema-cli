name: Version check

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  version-bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check version bump, changelog and tag
        run: |
          git fetch origin "$GITHUB_BASE_REF" --depth=1
          git show FETCH_HEAD:packages/cli/package.json > /tmp/base-package.json

          BASE_VERSION="$(node -p "require('/tmp/base-package.json').version")"
          CLI_VERSION="$(node -p "require('./packages/cli/package.json').version")"
          ROOT_VERSION="$(node -p "require('./package.json').version")"
          echo "base $BASE_VERSION -> head $CLI_VERSION"

          # Compares the x.y.z core numerically; prerelease suffixes are ignored,
          # matching isNewerVersion in the CLI.
          node -e '
            const parse = (v) => v.split("-")[0].split(".").map((n) => Number.parseInt(n, 10) || 0)
            const [base, head] = process.argv.slice(1).map(parse)
            for (let i = 0; i < 3; i++) {
              if (head[i] > base[i]) process.exit(0)
              if (head[i] < base[i]) break
            }
            console.error(`packages/cli version must be bumped above ${process.argv[1]} (got ${process.argv[2]})`)
            process.exit(1)
          ' "$BASE_VERSION" "$CLI_VERSION"

          if [ "$ROOT_VERSION" != "$CLI_VERSION" ]; then
            echo "root package.json ($ROOT_VERSION) must match packages/cli ($CLI_VERSION)" >&2
            exit 1
          fi

          ESCAPED_VERSION="$(printf '%s' "$CLI_VERSION" | sed 's/\./\\./g')"
          if ! grep -Eq "^## \[$ESCAPED_VERSION\] - [0-9]{4}-[0-9]{2}-[0-9]{2}$" CHANGELOG.md; then
            echo "CHANGELOG.md needs a dated entry '## [$CLI_VERSION] - YYYY-MM-DD' (replace 'unreleased' before merging to main)" >&2
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/v$CLI_VERSION" > /dev/null; then
            echo "tag v$CLI_VERSION already exists on the remote: this version is already released" >&2
            exit 1
          fi

          echo "ok: $BASE_VERSION -> $CLI_VERSION, changelog dated, tag v$CLI_VERSION free"
